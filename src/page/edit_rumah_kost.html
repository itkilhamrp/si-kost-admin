<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <link rel="stylesheet" href="/css/styles.bundle.min.css">
  <link rel="stylesheet" href="/css/desktop.css">
  <link rel="stylesheet" href="/css/mobile.css">
  <script type="module" src="/main.js"></script>
  <script type="module">
    import { initEditRumah } from "/js/pages/edit-rumah.js";
    document.addEventListener("DOMContentLoaded", initEditRumah);
  </script>
  <title>Edit Rumah Kos</title>
</head>
<body>
  <header class="app-header">
    <a href="#" class="back-btn" id="btn-back">←</a>
    <div class="header-title"><h1>Edit Rumah Kos</h1></div>
  </header>
  <div class="container no-fab">
    <div class="modern-form">
      <div class="input-group">
        <label>Nama Rumah Kos</label>
        <input type="text" id="nama" placeholder="Contoh: Kos Cempaka" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Alamat</label>
        <input type="text" id="alamat" placeholder="Jl. Merdeka No. 10" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Foto Rumah <span style="color:var(--text-3)">(opsional)</span></label>
        <div id="image-picker-area" class="image-picker-area" role="button" tabindex="0">
          <img id="preview-gambar" src="" alt="" class="hidden">
          <p id="picker-hint">Tap untuk pilih foto</p>
          <input type="file" id="input-gambar" accept="image/*" class="hidden">
        </div>
      </div>
      <button class="save-btn" id="btn-simpan">Simpan Perubahan</button>
    </div>
  </div>
  <div id="toast" class="toast"></div>
</body>
</html>
