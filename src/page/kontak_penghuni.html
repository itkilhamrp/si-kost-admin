<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <link rel="stylesheet" href="/css/styles.bundle.min.css">
  <link rel="stylesheet" href="/css/desktop.css">
  <link rel="stylesheet" href="/css/mobile.css">
  <script type="module" src="/main.js"></script>
  <script type="module">
    import { initKontakPenghuni } from "/js/pages/kontak-penghuni.js";
    import { initSidebarNav } from "/js/ui/sidebar-nav.js";
    document.addEventListener("DOMContentLoaded", () => {
    initKontakPenghuni();
    initSidebarNav();
  });
  </script>
  <title>Kontak Penghuni</title>
</head>
<body>

<header class="app-header">
  <div class="header-title-group">
    <h1>👥 Kontak Penghuni</h1>
    <p id="jumlah-kontak" class="salam-user"></p>
  </div>
  <span id="live-time"></span>
</header>

<!-- Mobile: search + filter sticky seperti biasa -->
<div class="search-bar-wrap kontak-search-mobile">
  <div class="search-bar-inner">
    <span class="si">🔍</span>
    <input type="search" id="q-kontak" placeholder="Cari nama atau nomor HP..." autocomplete="off">
    <button class="clear-btn hidden" id="q-kontak-clear">✕</button>
  </div>
</div>
<div class="kontak-filter-wrap kontak-filter-mobile">
  <div class="kontak-filter-inner" id="filter-jk">
    <button class="kf-tab active" data-jk="semua">Semua</button>
    <button class="kf-tab" data-jk="Pria">👨 Pria</button>
    <button class="kf-tab" data-jk="Wanita">👩 Wanita</button>
    <button class="kf-tab" data-jk="aktif">🏠 Aktif</button>
  </div>
</div>

<!-- Desktop: 2-panel layout -->
<div class="kontak-desktop-layout">

  <!-- Sidebar kiri: search + filter + stats -->
  <aside class="kontak-sidebar">
    <div class="kontak-sidebar-inner">

      <div class="kontak-sidebar-search">
        <div class="search-bar-inner">
          <span class="si">🔍</span>
          <input type="search" id="q-kontak-desk"
                 placeholder="Cari nama atau nomor HP..." autocomplete="off">
          <button class="clear-btn hidden" id="q-kontak-desk-clear">✕</button>
        </div>
      </div>

      <div class="kontak-sidebar-filter" id="filter-jk-desk">
        <button class="ksf-btn active" data-jk="semua">
          <span class="ksf-icon">👥</span>
          <span class="ksf-label">Semua</span>
          <span class="ksf-count" id="count-semua">—</span>
        </button>
        <button class="ksf-btn" data-jk="aktif">
          <span class="ksf-icon">🏠</span>
          <span class="ksf-label">Aktif Menghuni</span>
          <span class="ksf-count" id="count-aktif">—</span>
        </button>
        <button class="ksf-btn" data-jk="Pria">
          <span class="ksf-icon">👨</span>
          <span class="ksf-label">Pria</span>
          <span class="ksf-count" id="count-pria">—</span>
        </button>
        <button class="ksf-btn" data-jk="Wanita">
          <span class="ksf-icon">👩</span>
          <span class="ksf-label">Wanita</span>
          <span class="ksf-count" id="count-wanita">—</span>
        </button>
      </div>

      <a href="/page/add_kontak_penghuni.html"
         class="kontak-sidebar-add">
        <span>＋</span> Tambah Kontak Baru
      </a>

    </div>
  </aside>

  <!-- Konten kanan: list kontak -->
  <main class="kontak-main">
    <div id="list-kontak" class="kontak-grid"></div>
  </main>

</div>

<!-- Mobile: container biasa -->
<div class="container no-fab kontak-container-mobile">
  <div id="list-kontak-mobile" class="kontak-grid"></div>
</div>

<!-- SAMA persis di SEMUA halaman, sebelum </body> -->
<nav class="desk-sidebar-nav" role="navigation" aria-label="Navigasi Desktop">
  <button class="dsn-toggle" id="dsn-toggle-btn"
          data-tooltip="Buka Sidebar  Ctrl+\\"
          aria-label="Toggle sidebar">
    <div class="dsn-toggle-icon"><span></span><span></span><span></span></div>
  </button>
  <div class="dsn-items">
    <a class="dsn-item" href="/index.html">
      <span class="dsn-item-icon">🏠</span>
      <span class="dsn-item-label">Kost</span>
    </a>
    <a class="dsn-item" href="/page/keuangan.html">
      <span class="dsn-item-icon">💰</span>
      <span class="dsn-item-label">Keuangan</span>
    </a>
    <a class="dsn-item" href="/page/kontak_penghuni.html">
      <span class="dsn-item-icon">👥</span>
      <span class="dsn-item-label">Kontak</span>
    </a>
    <a class="dsn-item" href="/page/settings.html">
      <span class="dsn-item-icon">⚙️</span>
      <span class="dsn-item-label">Pengaturan</span>
    </a>
  </div>
</nav>

<nav class="bottom-nav">
  <a class="nav-item" href="/index.html"><span class="nav-icon">🏠</span><span>Kost</span></a>
  <a class="nav-item" href="/page/keuangan.html"><span class="nav-icon">💰</span><span>Keuangan</span></a>
  <a class="nav-item active" href="/page/kontak_penghuni.html"><span class="nav-icon">👥</span><span>Kontak</span></a>
  <a class="nav-item" href="/page/settings.html"><span class="nav-icon">⚙️</span><span>Pengaturan</span></a>
</nav>

<a href="/page/add_kontak_penghuni.html" class="fab kontak-fab-mobile" title="Tambah Kontak">+</a>
<div id="toast" class="toast"></div>
</body>
</html>
